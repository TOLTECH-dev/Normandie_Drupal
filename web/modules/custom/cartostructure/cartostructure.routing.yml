cartostructure.get_structures:
  path: '/cartostructure/get-structures'
  defaults:
    _controller: '\Drupal\cartostructure\Controller\CartostructureController::getStructures'
    _title: 'Structures'
  methods: [GET]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

