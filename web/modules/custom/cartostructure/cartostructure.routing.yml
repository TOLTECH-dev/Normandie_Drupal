cartostructure.get_permanences_par_structure:
  path: '/cartostructure/get-permanences-par-structure/{structure_id}'
  defaults:
    _controller: '\Drupal\cartostructure\Controller\CartostructureController::getPermanencesParStructure'
    _title: 'Permanences par structure'
  methods: [GET]
  requirements:
    _access: 'TRUE'
    structure_id: '^[SE]\d+$'
  options:
    no_cache: TRUE

cartostructure.get_permanences_par_departement:
  path: '/cartostructure/get-permanences-par-departement/{departement}'
