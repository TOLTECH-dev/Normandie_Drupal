  path: '/get_liste_ville_par_departement/{departement}'
  defaults:
    _controller: '\Drupal\cartochantier\Controller\CartochantierController::getListeVilleParDepartement'
    _title: 'Cities by department'
  methods: [GET]
  requirements:
    _access: 'TRUE'
    departement: '^\d{2}$'
  options:
    no_cache: TRUE

