cartochantier:
  path: '/get_demande'
  defaults:
    _controller: '\Drupal\cartochantier\Controller\CartochantierController::getDemande'
    _title: 'Work site requests'
  methods: [GET]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

cartochantier.type_demande:
  path: '/get_type_demande'
  defaults:
    _controller: '\Drupal\cartochantier\Controller\CartochantierController::getTypeDemande'
    _title: 'Request types'
  methods: [GET]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

cartochantier.liste_departement:
  path: '/get_liste_departement'
  defaults:
    _controller: '\Drupal\cartochantier\Controller\CartochantierController::getListeDepartement'
    _title: 'Department list'
  methods: [GET]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

cartochantier.liste_code_postal:
  path: '/get_liste_codePostal'
  defaults:
    _controller: '\Drupal\cartochantier\Controller\CartochantierController::getListeCodePostal'
    _title: 'Postal code list'
  methods: [GET]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

cartochantier.liste_ville:
  path: '/get_liste_ville'
  defaults:
    _controller: '\Drupal\cartochantier\Controller\CartochantierController::getListeVille'
    _title: 'City list'
  methods: [GET]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

cartochantier.liste_epci:
  path: '/get_liste_epci'
  defaults:
    _controller: '\Drupal\cartochantier\Controller\CartochantierController::getListeEpci'
    _title: 'EPCI list'
  methods: [GET]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

cartochantier.liste_ville_par_code_postal:
  path: '/get_liste_ville_par_codePostal/{code_postal}'
  defaults:
    _controller: '\Drupal\cartochantier\Controller\CartochantierController::getListeVilleParCodePostal'
    _title: 'Cities by postal code'
  methods: [GET]
  requirements:
    _access: 'TRUE'
    code_postal: '^\d{5}$'
  options:
    no_cache: TRUE

cartochantier.demande_par_type:
  path: '/get_demande_par_type/{type}'
  defaults:
    _controller: '\Drupal\cartochantier\Controller\CartochantierController::getDemandParType'
    _title: 'Requests by type'
  methods: [GET]
  requirements:
    _access: 'TRUE'
    type: '^[1-4]$'
  options:
    no_cache: TRUE

